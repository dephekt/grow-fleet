# M5Stack AirQ (K131 / v1.1) — AIR-QUALITY trend node on a StampS3 (ESP32-S3FN8).
#
# Scope is deliberately air quality only: CO2, PM1/2.5/4/10, VOC, NOx. The
# onboard temp/RH are NOT surfaced and there is no temp/RH/VPD alerting — the
# SCD40 self-heats badly in this enclosure (raw runs ~15.6°C above ambient; its
# temp/RH/VPD were validated useless against a SwitchBot + 3 HomePods on
# 2026-05-31), so this device is treated purely as a VOC/PM/CO2 monitor.
#
# Onboard hardware, all I2C on the internal bus_a (SDA=11 / SCL=12 @ 50kHz):
#   Sensirion SCD40  (CO2 + temp/RH)          @ 0x62 -> stock scd4x
#                                                     + scd4x_stats + scd4x_alerts (CO2-only)
#     temp/RH are kept internal: true (hidden) only because scd4x_stats/alerts
#     require those refs; they are not exposed.
#   Sensirion SEN55  (PM1/2.5/4/10, VOC, NOx) @ 0x69 -> stock sen5x (PM full mode)
#     Power-gated by GPIO10: must be driven HIGH before sen5x init (on_boot p800).
#   1.54" e-ink 200x200 (GDEW0154-class) on SPI -> stock waveshare_epaper "1.54inv2"
#     clk=5 mosi=6 | cs=4 dc=3 rst=2 busy=1
#
# Stock unit "reboots every ~10s" = M5 factory firmware deep-sleeping between
# ThingsCloud uploads; this config has NO deep_sleep so it stays awake and serves
# web/API + drives the e-ink. Intended USB-powered.
#
# Build / flash. First flash needs download mode (hold G0 while plugging USB);
# after that, flashes are OTA over WiFi:
#   esphome run devices/m5stack-airq.yaml --device /dev/ttyACM0       # first (USB)
#   esphome run devices/m5stack-airq.yaml --device m5stack-airq.local # thereafter (OTA)

substitutions:
  devicename: m5stack-airq
  friendlyname: "M5Stack AirQ"
  sensor_interval: 60s   # SCD40/SEN55 poll + e-ink refresh cadence

esphome:
  name: ${devicename}
  friendly_name: ${friendlyname}
  on_boot:
    # Power-gate the SEN55 on as early as possible (before sensor/i2c setup at
    # lower priority) so its first measurement command lands on a live sensor.
    - priority: 800
      then:
        - output.turn_on: sen55_power

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 8MB   # StampS3 = ESP32-S3FN8: 8MB flash, no PSRAM
  framework:
    type: arduino

# scd4x, sen5x, and waveshare_epaper are all native ESPHome — only the two
# SCD4x value-add components come from this repo.
external_components:
  - source:
      type: git
      url: https://codeberg.org/stackdrift/esphome-components.git
      ref: 798fa7268b5940f1dcfef3ff05e601e5b004fe81
      path: .
    components:
      - scd4x_stats
      - scd4x_alerts

logger:
  level: DEBUG   # DEBUG during bring-up to see the I2C scan + live values
  hardware_uart: USB_SERIAL_JTAG   # StampS3 has native USB only (no UART chip)

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

captive_portal:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "airq-${devicename}"
    password: !secret fallback_hotspot_key

i2c:
  id: bus_a
  sda: 11           # internal sensor bus (SCD40 + SEN55), NOT the Grove port
  scl: 12
  frequency: 50kHz  # conservative — matches the known-good M5 reference
  scan: true

spi:
  clk_pin: 5
  mosi_pin: 6       # e-ink is write-only; no MISO

time:
  - platform: sntp
    id: sntp_time   # required by scd4x_stats for the daily CO2 rollover

web_server_base:
  id: my_web_server_base

web_server:
  version: 3
  port: 80
  sorting_groups:
    - id: co2
      name: "CO2"
      sorting_weight: 10
    - id: particulates
      name: "Particulates & Gases"
      sorting_weight: 20
    - id: alerts
      name: "CO2 Alerts"
      sorting_weight: 30
    - id: diagnostics
      name: "Diagnostics"
      sorting_weight: 40

# ---------------- SEN55 power gate (GPIO10) ----------------
# Driven HIGH on_boot (above). Exposed here only as the output the boot hook
# toggles; not surfaced to the UI.
output:
  - platform: gpio
    pin: 10
    id: sen55_power

# ---------------- Fonts for the e-ink ----------------
# gfonts:// is fetched + glyph-subset at compile time (build container has net).
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 16
  - file: "gfonts://Roboto@500"
    id: font_medium
    size: 20
  - file: "gfonts://Roboto@700"
    id: font_large
    size: 34

# ---------------- 1.54" e-ink display (air quality only) ----------------
display:
  - platform: waveshare_epaper
    id: eink
    model: 1.54inv2       # type-A 200x200. If your panel ghosts, try
                          # "1.54in-m5coreink-m09" (GDEW0154M09).
    cs_pin: 4
    dc_pin: 3
    reset_pin: 2
    busy_pin:
      number: 1
      inverted: false
    reset_duration: 2ms
    full_update_every: 1  # full refresh every update. This panel ghosts badly on
                          # partial refresh (values pile on stale pixels); at 60s
                          # the brief full-refresh flash is fine.
    update_interval: ${sensor_interval}
    lambda: |-
      // Header
      it.printf(100, 2, id(font_medium), TextAlign::TOP_CENTER, "Air Quality");
      it.line(0, 24, 200, 24);

      // CO2 headline (SCD40). "--" until the first reading lands.
      it.print(4, 28, id(font_medium), "CO2");
      if (isnan(id(co2_sensor).state))
        it.print(196, 28, id(font_medium), TextAlign::TOP_RIGHT, "-- ppm");
      else
        it.printf(196, 28, id(font_medium), TextAlign::TOP_RIGHT, "%.0f ppm", id(co2_sensor).state);
      it.line(0, 52, 200, 52);

      // Particulates (SEN55) — one helper for the four µg/m³ rows.
      auto pm_row = [&](int y, const char *label, float v) {
        it.print(4, y, id(font_small), label);
        if (isnan(v))
          it.print(196, y, id(font_small), TextAlign::TOP_RIGHT, "-- ug/m3");
        else
          it.printf(196, y, id(font_small), TextAlign::TOP_RIGHT, "%.1f ug/m3", v);
      };
      pm_row(56,  "PM1.0", id(pm1_0_sensor).state);
      pm_row(76,  "PM2.5", id(pm2_5_sensor).state);
      pm_row(96,  "PM4.0", id(pm4_0_sensor).state);
      pm_row(116, "PM10",  id(pm10_0_sensor).state);
      it.line(0, 140, 200, 140);

      // VOC / NOx indices (SEN55) — unitless integers.
      auto idx_row = [&](int y, const char *label, float v) {
        it.print(4, y, id(font_small), label);
        if (isnan(v))
          it.print(196, y, id(font_small), TextAlign::TOP_RIGHT, "--");
        else
          it.printf(196, y, id(font_small), TextAlign::TOP_RIGHT, "%.0f", v);
      };
      idx_row(144, "VOC Index", id(voc_sensor).state);
      idx_row(166, "NOx Index", id(nox_sensor).state);

# ---------------- Sensors ----------------
sensor:
  # CO2 (SCD40). temp/RH are read but kept internal — they only exist to satisfy
  # scd4x_stats/scd4x_alerts refs; they are NOT trustworthy on this self-heated
  # board, so they are not surfaced.
  - platform: scd4x
    id: co2_component
    address: 0x62
    i2c_id: bus_a
    update_interval: ${sensor_interval}
    # 15.6°C self-heat offset (validated 2026-05-31). Does not affect CO2; kept
    # only so the hidden temp/RH are roughly sane.
    temperature_offset: 15.6°C
    co2:
      name: "CO2"
      id: co2_sensor
      web_server: { sorting_group_id: co2, sorting_weight: 10 }
    temperature:
      name: "SCD40 Temperature (internal)"
      id: temperature_sensor
      internal: true
    humidity:
      name: "SCD40 Humidity (internal)"
      id: humidity_sensor
      internal: true

  # Particulates + VOC/NOx (SEN55). Full mode (PM sensors configured -> fan +
  # laser on). SEN55's own temp/RH are intentionally omitted.
  - platform: sen5x
    id: sen55_component
    address: 0x69
    i2c_id: bus_a
    update_interval: ${sensor_interval}
    pm_1_0:
      name: "PM <1um"
      id: pm1_0_sensor
      web_server: { sorting_group_id: particulates, sorting_weight: 10 }
    pm_2_5:
      name: "PM <2.5um"
      id: pm2_5_sensor
      web_server: { sorting_group_id: particulates, sorting_weight: 20 }
    pm_4_0:
      name: "PM <4um"
      id: pm4_0_sensor
      web_server: { sorting_group_id: particulates, sorting_weight: 30 }
    pm_10_0:
      name: "PM <10um"
      id: pm10_0_sensor
      web_server: { sorting_group_id: particulates, sorting_weight: 40 }
    voc:
      name: "VOC Index"
      id: voc_sensor
      web_server: { sorting_group_id: particulates, sorting_weight: 50 }
    nox:
      name: "NOx Index"
      id: nox_sensor
      web_server: { sorting_group_id: particulates, sorting_weight: 60 }

  # Diagnostics
  - platform: uptime
    name: "Uptime"
    update_interval: 60s
    web_server: { sorting_group_id: diagnostics, sorting_weight: 10 }
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    web_server: { sorting_group_id: diagnostics, sorting_weight: 20 }

# ---------------- CO2 trend stats (daily max + moving average) ----------------
# scd4x_stats requires temp/humidity refs even though we only emit CO2 outputs.
scd4x_stats:
  id: co2_stats
  co2_sensor: co2_sensor
  temperature_sensor: temperature_sensor
  humidity_sensor: humidity_sensor
  time_id: sntp_time
  daily_max_co2:
    name: "Daily Max CO2"
    id: daily_max_co2
    web_server: { sorting_group_id: co2, sorting_weight: 20 }
  co2_moving_avg:
    name: "CO2 Moving Average"
    id: co2_moving_avg
    web_server: { sorting_group_id: co2, sorting_weight: 30 }

# ---------------- CO2 alerts only (no temp/humidity/VPD) ----------------
# temp/humidity refs are required by the component but drive no alerts here.
scd4x_alerts:
  id: co2_alerts
  co2_sensor: co2_sensor
  temperature_sensor: temperature_sensor
  humidity_sensor: humidity_sensor
  co2_high_threshold: 1500
  co2_low_threshold: 800
  co2_high_alert:
    name: "CO2 High Alert"
    id: co2_high_alert
    web_server: { sorting_group_id: alerts, sorting_weight: 30 }
  co2_low_alert:
    name: "CO2 Low Alert"
    id: co2_low_alert
    web_server: { sorting_group_id: alerts, sorting_weight: 40 }
  co2_high_threshold_number:
    name: "CO2 High Threshold"
    web_server: { sorting_group_id: alerts, sorting_weight: 10 }
  co2_low_threshold_number:
    name: "CO2 Low Threshold"
    web_server: { sorting_group_id: alerts, sorting_weight: 20 }

# scd4x_alerts emits binary_sensor + number entities; the status sensor + these
# dummy internal template entities register those platforms so its codegen has
# somewhere to attach (mirrors the known-good AtomS3U rig config).
binary_sensor:
  - platform: status
    name: "API Connected"
    web_server: { sorting_group_id: diagnostics, sorting_weight: 30 }
  - platform: template
    name: "Dummy Template Binary Sensor"
    id: dummy_template_binary_sensor
    internal: true

number:
  - platform: template
    name: "Dummy Template Number"
    id: dummy_template_number
    min_value: 0
    max_value: 1
    step: 1
    optimistic: true
    internal: true

button:
  - platform: restart
    name: "Restart"
    web_server: { sorting_group_id: diagnostics, sorting_weight: 60 }

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      web_server: { sorting_group_id: diagnostics, sorting_weight: 90 }
  - platform: version
    name: "ESPHome Version"
    web_server: { sorting_group_id: diagnostics, sorting_weight: 100 }
