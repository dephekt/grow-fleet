    accuracy_decimals: 3
    power_control_switch: ph_enable
    rtd_sensor: rtd_sensor
    temp_compensation_switch: ph_temp_comp_enable
    calibration_mode_switch: ph_cal_mode_enable
    web_server:
      sorting_group_id: overview
      sorting_weight: 10
    voltage:
      name: "pH Voltage"
      web_server:
        sorting_group_id: ph_circuit
    reset_reason:
      name: "pH Reset Reason"
      web_server:
        sorting_group_id: ph_circuit
    firmware_version:
      name: "pH Firmware Version"
      web_server:
        sorting_group_id: ph_circuit
    calibration_status:
      name: "pH Calibration Status"
