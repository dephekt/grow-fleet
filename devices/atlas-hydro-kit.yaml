      entity_category: diagnostic
      web_server:
        sorting_group_id: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
      web_server:
        sorting_group_id: diagnostic
    bssid:
      name: "Connected BSSID"
      entity_category: diagnostic
      web_server:
        sorting_group_id: diagnostic
    mac_address:
      name: "MAC Address"
      entity_category: diagnostic
      web_server:
        sorting_group_id: diagnostic
    dns_address:
      name: "DNS Address"
      entity_category: diagnostic
      web_server:
        sorting_group_id: diagnostic

