select:

button:
  # === Diagnostic: re-query the persisted state from each circuit on demand ===
  - platform: template
    name: "Refresh Circuit State"
    entity_category: diagnostic
    web_server:
      sorting_group_id: diagnostic
    on_press:
      - lambda: |-
          id(ec_sensor).request_cell_constant_query();
          id(ec_sensor).request_tds_query();
          id(orp_sensor).request_extended_scale_query();

  # === Factory Reset ===
  - platform: template
    name: "pH Factory Reset"
    web_server:
      sorting_group_id: ph_circuit
    on_press:
      - lambda: 'id(ph_sensor).factory_reset();'

  - platform: template
    name: "EC Factory Reset"
    web_server:
      sorting_group_id: ec_circuit
    on_press:
      - lambda: 'id(ec_sensor).factory_reset();'

  - platform: template
    name: "RTD Factory Reset"
    web_server:
      sorting_group_id: rtd_circuit
    on_press:
      - lambda: 'id(rtd_sensor).factory_reset();'

  - platform: template
    name: "ORP Factory Reset"
    web_server:
      sorting_group_id: orp_circuit
    on_press:
      - lambda: 'id(orp_sensor).factory_reset();'

  # === pH Calibration ===
  - platform: template
    name: "pH Cal Mid (7.00)"
    web_server:
      sorting_group_id: ph_cal
    on_press:
      - lambda: 'id(ph_sensor).set_calibration_point_mid(7.00);'

  - platform: template
    name: "pH Cal Low (4.00)"
    web_server:
      sorting_group_id: ph_cal
    on_press:
      - lambda: 'id(ph_sensor).set_calibration_point_low(4.00);'

  - platform: template
    name: "pH Cal High (10.00)"
    web_server:
      sorting_group_id: ph_cal
    on_press:
      - lambda: 'id(ph_sensor).set_calibration_point_high(10.00);'

  # === EC Calibration ===
  - platform: template
    name: "EC Dry Calibration"
    web_server:
      sorting_group_id: ec_cal
    on_press:
      - lambda: 'id(ec_sensor).set_calibration_point_dry();'

  - platform: template
    name: "EC Cal Low (1413 µS⁄cm)"
    web_server:
      sorting_group_id: ec_cal
    on_press:
      - lambda: 'id(ec_sensor).set_calibration_point_low(1413.0);'

  - platform: template
    name: "EC Cal High (5000 µS⁄cm)"
    web_server:
      sorting_group_id: ec_cal
    on_press:
      - lambda: 'id(ec_sensor).set_calibration_point_high(5000.0);'

  # === RTD Calibration ===
  - platform: template
    name: "RTD Calibration (25.0°C)"
    web_server:
      sorting_group_id: rtd_cal
    on_press:
      - lambda: 'id(rtd_sensor).set_calibration_generic(25.0);'

  # === ORP Calibration ===
  - platform: template
    name: "ORP Calibration (400 mV)"
    web_server:
      sorting_group_id: orp_cal
    on_press:
      - lambda: 'id(orp_sensor).set_calibration_generic(400.0);'

  # === Clear Calibration ===
  - platform: template
    name: "pH Clear Calibration"
    web_server:
      sorting_group_id: ph_cal
    on_press:
      - lambda: 'id(ph_sensor).clear_calibration();'

  - platform: template
    name: "EC Clear Calibration"
    web_server:
      sorting_group_id: ec_cal
    on_press:
      - lambda: 'id(ec_sensor).clear_calibration();'

  - platform: template
    name: "RTD Clear Calibration"
    web_server:
      sorting_group_id: rtd_cal
    on_press:
      - lambda: 'id(rtd_sensor).clear_calibration();'

  - platform: template
    name: "ORP Clear Calibration"
    web_server:
      sorting_group_id: orp_cal
    on_press:
      - lambda: 'id(orp_sensor).clear_calibration();'

  # === System Control ===
  - platform: restart
    name: "Restart Device"

number:

switch:
  # === Circuit Power Control ===
  # Truth table for enable pins of sensor ports
  # +--------+--------+--------+----------------+
  # | Sensor | GPIO   | State  | Sensor Power   |
  # +--------+--------+--------+----------------+
  # | pH     | GPIO12 | LOW    | ON             |
  # | EC     | GPIO27 | LOW    | ON             |
  # | ORP    | GPIO33 | LOW    | ON             |
  # | RTD    | GPIO15 | HIGH   | ON             |
  # +--------+--------+--------+----------------+
  - platform: gpio
    pin:
      number: GPIO12
      inverted: true
    name: "Enable pH Circuit"
    id: ph_enable
    web_server:
      sorting_group_id: ph_circuit
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    pin:
      number: GPIO27
      inverted: true
    name: "Enable EC Circuit"
    id: ec_enable
    web_server:
      sorting_group_id: ec_circuit
    restore_mode: RESTORE_DEFAULT_ON

  # Slot 4 = AUX (general-purpose port); currently hosts the ORP circuit.
  - platform: gpio
    pin:
      number: GPIO33
      inverted: true
    name: "Enable AUX Circuit"
    id: aux_enable
    web_server:
      sorting_group_id: orp_circuit
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    pin:
      number: GPIO15
      inverted: false
    name: "Enable RTD Circuit"
    id: rtd_enable
    web_server:
      sorting_group_id: rtd_circuit
    restore_mode: RESTORE_DEFAULT_ON

  # === Temperature Compensation Control ===
  - platform: template
    name: "pH Temperature Compensation"
    id: ph_temp_comp_enable
    optimistic: true
    web_server:
      sorting_group_id: temp_comp
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "EC Temperature Compensation"
    id: ec_temp_comp_enable
    optimistic: true
    web_server:
      sorting_group_id: temp_comp
    restore_mode: RESTORE_DEFAULT_OFF

  # === Calibration Mode Control ===
  - platform: template
    name: "pH Calibration Mode"
    id: ph_cal_mode_enable
    optimistic: true
    web_server:
      sorting_group_id: ph_cal
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "EC Calibration Mode"
    id: ec_cal_mode_enable
    optimistic: true
    web_server:
      sorting_group_id: ec_cal
    restore_mode: RESTORE_DEFAULT_OFF
