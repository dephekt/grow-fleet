      web_server:
        sorting_group_id: ec_cal
    temperature_compensation:
      name: "EC Temperature Compensation"
      web_server:
        sorting_group_id: temp_comp
    current_command:
      name: "EC Current Command"
      web_server:
        sorting_group_id: ec_circuit
    next_command:
      name: "EC Next Command"
      web_server:
        sorting_group_id: ec_circuit
    last_command:
      name: "EC Last Command"
      web_server:
