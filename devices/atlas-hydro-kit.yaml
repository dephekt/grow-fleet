substitutions:
  device_mac: "atlas01"

esphome:
  name: atlas-hydro-monitor
  friendly_name: Atlas Hydro Monitor

esp32:
  board: featheresp32
  framework:
    type: arduino

ota:
  - platform: esphome
    password: !secret hydro_monitor_ota_key

api:
  encryption:
    key: !secret api_encryption_key

external_components:
  - source:
      type: git
      url: https://codeberg.org/stackdrift/esphome-components.git
      ref: 798fa7268b5940f1dcfef3ff05e601e5b004fe81
      path: .
    components: ["ezo_types"]

logger:
  level: DEBUG

captive_portal:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  passive_scan: false
  power_save_mode: none
  ap:
    ssid: "atlas-${device_mac}"
    password: !secret fallback_hotspot_key

# MQTT -> our own broker (mosquitto-site on media-server). grow-control Phase 0.
# Coexists with api: above — HA stays an optional observer, never in the path.
# Discovery is scoped inside the site broker ACL so grow-app can derive entities
# from retained ESPHome/Home Assistant MQTT discovery payloads without exposing
# a global homeassistant/# prefix. Firmware DEBUG logs stay off the bus.
mqtt:
  broker: 192.168.8.3              # media-server LAN IP; mosquitto-site listens on :1883
  port: 1883
  username: edge-daniel-home
  password: !secret mqtt_password
  topic_prefix: grow/daniel-home/atlas-hydro-monitor
  discovery: true
  discovery_prefix: grow/daniel-home/_discovery
  log_topic:
    topic: grow/daniel-home/atlas-hydro-monitor/debug
    level: NONE
  on_connect:
    - mqtt.publish:
        topic: grow/daniel-home/atlas-hydro-monitor/_ui/config
        retain: true
        payload: |-
          {
            "schema": "grow-ui.v1",
            "nodeId": "atlas-hydro-monitor",
            "groups": [
              { "id": "overview", "title": "At a Glance", "order": 10, "variant": "metrics", "defaultOpen": true },
              { "id": "controls", "title": "Circuit Controls", "order": 20, "defaultOpen": true },
              { "id": "temp_comp", "title": "Temperature Compensation", "order": 25, "defaultOpen": true },
              { "id": "ph_cal", "title": "pH Calibration", "order": 30, "defaultOpen": false },
              { "id": "ec_cal", "title": "EC Calibration", "order": 40, "defaultOpen": false },
              { "id": "rtd_cal", "title": "RTD Calibration", "order": 50, "defaultOpen": false },
              { "id": "orp_cal", "title": "ORP Calibration", "order": 60, "defaultOpen": false },
              { "id": "maintenance", "title": "Maintenance", "order": 80, "defaultOpen": false },
              { "id": "diagnostics", "title": "Diagnostics", "order": 90, "defaultOpen": false }
            ],
            "entities": [
              { "component": "sensor", "objectId": "water_temperature", "group": "overview", "role": "metric", "order": 10, "label": "Water Temp" },
              { "component": "sensor", "objectId": "water_ph", "group": "overview", "role": "metric", "order": 20, "label": "Water pH" },
              { "component": "sensor", "objectId": "water_ec", "group": "overview", "role": "metric", "order": 30, "label": "Water EC" },
              { "component": "sensor", "objectId": "water_tds", "group": "overview", "role": "metric", "order": 40, "label": "Water TDS" },
              { "component": "sensor", "objectId": "water_orp", "group": "overview", "role": "metric", "order": 50, "label": "Water ORP" },
              { "component": "switch", "objectId": "enable_ph_circuit", "group": "controls", "order": 10 },
              { "component": "switch", "objectId": "enable_ec_circuit", "group": "controls", "order": 20 },
              { "component": "switch", "objectId": "enable_rtd_circuit", "group": "controls", "order": 30 },
              { "component": "switch", "objectId": "enable_aux_circuit", "group": "controls", "order": 40 },
              { "component": "select", "objectId": "ec_cell_constant", "group": "controls", "order": 50 },
              { "component": "number", "objectId": "ec_tds_conversion_factor", "group": "controls", "order": 60 },
              { "component": "switch", "objectId": "orp_extended_scale", "group": "controls", "order": 70 },
              { "component": "switch", "objectId": "ph_temperature_compensation", "group": "temp_comp", "order": 10, "label": "pH Compensation Enabled" },
              { "component": "sensor", "objectId": "ph_temperature_compensation", "group": "temp_comp", "order": 20, "label": "pH Compensation Temp" },
              { "component": "switch", "objectId": "ec_temperature_compensation", "group": "temp_comp", "order": 30, "label": "EC Compensation Enabled" },
              { "component": "sensor", "objectId": "ec_temperature_compensation", "group": "temp_comp", "order": 40, "label": "EC Compensation Temp" },
              { "component": "switch", "objectId": "ph_calibration_mode", "group": "ph_cal", "order": 10 },
              { "component": "sensor", "objectId": "ph_calibration_status", "group": "ph_cal", "order": 20 },
              { "component": "sensor", "objectId": "ph_acid_slope_quality", "group": "ph_cal", "order": 30 },
              { "component": "sensor", "objectId": "ph_alkaline_slope_quality", "group": "ph_cal", "order": 40 },
              { "component": "sensor", "objectId": "ph_asymmetry_potential", "group": "ph_cal", "order": 50 },
              { "component": "button", "objectId": "ph_cal_mid__7_00_", "group": "ph_cal", "order": 60 },
              { "component": "button", "objectId": "ph_cal_low__4_00_", "group": "ph_cal", "order": 70 },
              { "component": "button", "objectId": "ph_cal_high__10_00_", "group": "ph_cal", "order": 80 },
              { "component": "button", "objectId": "ph_clear_calibration", "group": "ph_cal", "order": 90 },
              { "component": "switch", "objectId": "ec_calibration_mode", "group": "ec_cal", "order": 10 },
              { "component": "sensor", "objectId": "ec_calibration_status", "group": "ec_cal", "order": 20 },
              { "component": "button", "objectId": "ec_dry_calibration", "group": "ec_cal", "order": 30 },
              { "component": "button", "objectId": "ec_cal_low__1413___s___cm_", "group": "ec_cal", "order": 40 },
              { "component": "button", "objectId": "ec_cal_high__5000___s___cm_", "group": "ec_cal", "order": 50 },
              { "component": "button", "objectId": "ec_clear_calibration", "group": "ec_cal", "order": 60 },
              { "component": "sensor", "objectId": "rtd_calibration_status", "group": "rtd_cal", "order": 10 },
              { "component": "button", "objectId": "rtd_calibration__25_0__c_", "group": "rtd_cal", "order": 20 },
              { "component": "button", "objectId": "rtd_clear_calibration", "group": "rtd_cal", "order": 30 },
              { "component": "sensor", "objectId": "orp_calibration_status", "group": "orp_cal", "order": 10 },
              { "component": "button", "objectId": "orp_calibration__400_mv_", "group": "orp_cal", "order": 20 },
              { "component": "button", "objectId": "orp_clear_calibration", "group": "orp_cal", "order": 30 },
              { "component": "button", "objectId": "refresh_circuit_state", "group": "maintenance", "order": 10 },
              { "component": "button", "objectId": "restart_device", "group": "maintenance", "order": 20 },
              { "component": "button", "objectId": "ph_factory_reset", "group": "maintenance", "order": 30 },
              { "component": "button", "objectId": "ec_factory_reset", "group": "maintenance", "order": 40 },
              { "component": "button", "objectId": "rtd_factory_reset", "group": "maintenance", "order": 50 },
              { "component": "button", "objectId": "orp_factory_reset", "group": "maintenance", "order": 60 }
            ]
          }

web_server:
  version: 3
  port: 80

  sorting_groups:
    # Layout order -- Configuration and Diagnostic are pinned to the top by
    # web_server v3, then: At a Glance, the calibration sections, and finally
    # the per-circuit detail groups.
    - id: overview
      name: "At a Glance"
      sorting_weight: 5
    - id: temp_comp
      name: "Temperature Compensation"
      sorting_weight: 8
    - id: ph_cal
      name: "pH Calibration"
      sorting_weight: 10
    - id: ec_cal
      name: "EC Calibration"
      sorting_weight: 12
    - id: rtd_cal
      name: "RTD Calibration"
      sorting_weight: 13
    - id: orp_cal
      name: "ORP Calibration"
      sorting_weight: 14
    - id: ph_circuit
      name: "pH Circuit"
      sorting_weight: 20
    - id: ec_circuit
      name: "EC Circuit"
      sorting_weight: 22
    - id: rtd_circuit
      name: "RTD Circuit"
      sorting_weight: 24
    - id: orp_circuit
      name: "ORP Circuit"
      sorting_weight: 26
    - id: diagnostic
      name: "Diagnostic"
      sorting_weight: 80

i2c:
  sda: 23
  scl: 22
  scan: true

status_led:
  pin:
    number: GPIO13
    inverted: true

binary_sensor:
  - platform: status
    name: "Home Assistant API Status"
    entity_category: diagnostic
    web_server:
      sorting_group_id: diagnostic

text_sensor:
  - platform: version
    name: "ESP Version"
    hide_timestamp: true
    entity_category: diagnostic
    web_server:
      sorting_group_id: diagnostic
  - platform: wifi_info
    ip_address:
