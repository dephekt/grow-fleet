name: firmware

env:
  PLATFORMIO_CORE_DIR: ${{ github.workspace }}/.platformio
  OCI_REGISTRY: ghcr.io
  OCI_OWNER: dephekt
  OCI_PACKAGE_PREFIX: grow-fleet
  OCI_SOURCE_URL: https://github.com/dephekt/grow-fleet

on:
  pull_request:
    paths:
      - "assets/**"
      - "devices/**"
      - "fleet.yaml"
      - "scripts/**"
      - ".github/workflows/firmware.yml"
  push: {}
  workflow_dispatch:
    inputs:
      device:
        description: "Optional device to compile"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  pr_prepare:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:2026.5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_devices: ${{ steps.matrix.outputs.has_devices }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - id: matrix
        run: |
          MATRIX="$(uv run --locked python scripts/impacted_devices.py --base '${{ github.event.pull_request.base.sha }}' --head '${{ github.event.pull_request.head.sha }}' --matrix)"
          HAS_DEVICES="$(MATRIX="$MATRIX" uv run --locked python -c 'import json, os; payload = json.loads(os.environ["MATRIX"]); print("true" if payload.get("include") else "false")')"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "has_devices=$HAS_DEVICES" >> "$GITHUB_OUTPUT"

  pr_compile:
    if: github.event_name == 'pull_request' && needs.pr_prepare.outputs.has_devices == 'true'
    needs: pr_prepare
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:2026.5
    strategy:
      matrix: ${{ fromJson(needs.pr_prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - id: platformio_cache_key
        name: Compute PlatformIO cache key
        run: |
          set -eu
          digest="$(git ls-files -z -- 'devices/*.yaml' fleet.yaml pyproject.toml uv.lock | xargs -0 sha256sum | sha256sum | awk '{print $1}')"
          echo "key=platformio-${RUNNER_OS}-esphome-2026.5-$digest" >> "$GITHUB_OUTPUT"
          echo "restore-key=platformio-${RUNNER_OS}-esphome-2026.5-" >> "$GITHUB_OUTPUT"

      - name: Restore PlatformIO cache
        id: platformio_cache
        uses: actions/cache/restore@v6
        with:
          path: .platformio
          key: ${{ steps.platformio_cache_key.outputs.key }}
          restore-keys: |
            ${{ steps.platformio_cache_key.outputs.restore-key }}

      - name: Compile impacted device
        run: |
          rm -f devices/secrets.yaml
          uv run --locked python scripts/compile_devices.py "${{ matrix.device }}"

  main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:2026.5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up ORAS
        uses: oras-project/setup-oras@v2.0.0

      - id: publish_ready
        name: Check protected publish configuration
        env:
          FLEET_SECRETS_YAML_B64: ${{ secrets.FLEET_SECRETS_YAML_B64 }}
        run: |
          set -eu
          if [ -z "${FLEET_SECRETS_YAML_B64:-}" ]; then
            echo "::notice::Skipping private firmware publish until FLEET_SECRETS_YAML_B64 is configured"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: steps.publish_ready.outputs.ready == 'true'
        env:
          GHCR_USER: ${{ secrets.GHCR_USER || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
        run: |
          set -eu
          printf '%s' "$GHCR_TOKEN" | oras login "$OCI_REGISTRY" -u "$GHCR_USER" --password-stdin

      - id: edge_meta
        name: Build edge firmware metadata
        if: steps.publish_ready.outputs.ready == 'true'
        run: |
          sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          version="edge-$(date -u +%Y%m%dT%H%M%SZ)-$short_sha"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - id: edge_devices
        name: Select edge devices to build
        if: steps.publish_ready.outputs.ready == 'true'
        run: |
          devices="$(uv run --locked python scripts/edge_build_devices.py \
            --head "${{ steps.edge_meta.outputs.sha }}" \
            --exclude-version "${{ steps.edge_meta.outputs.version }}")"
          if [ -n "$devices" ]; then
            echo "has_devices=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No release device firmware changed since the last published edge packages"
            echo "has_devices=false" >> "$GITHUB_OUTPUT"
          fi
          echo "devices=$devices" >> "$GITHUB_OUTPUT"

      - name: Install protected firmware secrets
        if: steps.publish_ready.outputs.ready == 'true' && steps.edge_devices.outputs.has_devices == 'true'
        env:
          FLEET_SECRETS_YAML_B64: ${{ secrets.FLEET_SECRETS_YAML_B64 }}
        run: uv run --locked python scripts/install_firmware_secrets.py --require-flashable

      - id: platformio_cache_key
        name: Compute PlatformIO cache key
        if: steps.publish_ready.outputs.ready == 'true' && steps.edge_devices.outputs.has_devices == 'true'
        run: |
          set -eu
          digest="$(git ls-files -z -- 'devices/*.yaml' fleet.yaml pyproject.toml uv.lock | xargs -0 sha256sum | sha256sum | awk '{print $1}')"
          echo "key=platformio-${RUNNER_OS}-esphome-2026.5-$digest" >> "$GITHUB_OUTPUT"
          echo "restore-key=platformio-${RUNNER_OS}-esphome-2026.5-" >> "$GITHUB_OUTPUT"

      - name: Restore PlatformIO cache
        id: platformio_cache
        if: steps.publish_ready.outputs.ready == 'true' && steps.edge_devices.outputs.has_devices == 'true'
        uses: actions/cache/restore@v6
        with:
          path: .platformio
          key: ${{ steps.platformio_cache_key.outputs.key }}
          restore-keys: |
            ${{ steps.platformio_cache_key.outputs.restore-key }}

      - name: Compile release devices for edge
        if: steps.publish_ready.outputs.ready == 'true' && steps.edge_devices.outputs.has_devices == 'true'
        run: uv run --locked python scripts/compile_devices.py ${{ steps.edge_devices.outputs.devices }} --firmware-version "${{ steps.edge_meta.outputs.version }}"

      - name: Save PlatformIO cache
        if: steps.publish_ready.outputs.ready == 'true' && steps.edge_devices.outputs.has_devices == 'true' && steps.platformio_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .platformio
          key: ${{ steps.platformio_cache_key.outputs.key }}

      - name: Package edge devices
        if: steps.publish_ready.outputs.ready == 'true' && steps.edge_devices.outputs.has_devices == 'true'
        run: |
          devices="${{ steps.edge_devices.outputs.devices }}"
          for device in $devices; do
            base_file="$(mktemp)"
            uv run --locked python scripts/edge_changelog_base.py "$device" \
              --exclude-version "${{ steps.edge_meta.outputs.version }}" > "$base_file"
            base_ref="$(sed -n 's/^source_sha=//p' "$base_file")"
            base_version="$(sed -n 's/^version=//p' "$base_file")"
            rm -f "$base_file"
            set --
            if [ -n "$base_ref" ]; then
              set -- --changelog-base-ref "$base_ref" --changelog-base-version "$base_version"
            fi
            uv run --locked python scripts/package_device.py "$device" \
              --version "${{ steps.edge_meta.outputs.version }}" \
              --channel edge \
              --source-sha "${{ steps.edge_meta.outputs.sha }}" \
              --build-profile site-private \
              --require-flashable-secrets \
              "$@"
          done

      - name: Publish edge devices
        if: steps.publish_ready.outputs.ready == 'true' && steps.edge_devices.outputs.has_devices == 'true'
        run: |
          devices="${{ steps.edge_devices.outputs.devices }}"
          uv run --locked python scripts/publish_packages.py --prune-edge --keep-edge 10 $devices

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/firmware/')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:2026.5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up ORAS
        uses: oras-project/setup-oras@v2.0.0

      - id: publish_ready
        name: Check protected publish configuration
        env:
          FLEET_SECRETS_YAML_B64: ${{ secrets.FLEET_SECRETS_YAML_B64 }}
        run: |
          set -eu
          if [ -z "${FLEET_SECRETS_YAML_B64:-}" ]; then
            echo "::notice::Skipping private firmware publish until FLEET_SECRETS_YAML_B64 is configured"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: steps.publish_ready.outputs.ready == 'true'
        env:
          GHCR_USER: ${{ secrets.GHCR_USER || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
        run: |
          set -eu
          printf '%s' "$GHCR_TOKEN" | oras login "$OCI_REGISTRY" -u "$GHCR_USER" --password-stdin

      - id: meta
        if: steps.publish_ready.outputs.ready == 'true'
        run: |
          tag="$GITHUB_REF_NAME"
          rest="${tag#firmware/}"
          device="${rest%%/v*}"
          version="${tag#firmware/$device/}"
          sha="$(git rev-parse HEAD)"
          echo "device=$device" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Install protected firmware secrets
        if: steps.publish_ready.outputs.ready == 'true'
        env:
          FLEET_SECRETS_YAML_B64: ${{ secrets.FLEET_SECRETS_YAML_B64 }}
        run: uv run --locked python scripts/install_firmware_secrets.py --require-flashable

      - id: platformio_cache_key
        name: Compute PlatformIO cache key
        if: steps.publish_ready.outputs.ready == 'true'
        run: |
          set -eu
          digest="$(git ls-files -z -- 'devices/*.yaml' fleet.yaml pyproject.toml uv.lock | xargs -0 sha256sum | sha256sum | awk '{print $1}')"
          echo "key=platformio-${RUNNER_OS}-esphome-2026.5-$digest" >> "$GITHUB_OUTPUT"
          echo "restore-key=platformio-${RUNNER_OS}-esphome-2026.5-" >> "$GITHUB_OUTPUT"

      - name: Restore PlatformIO cache
        id: platformio_cache
        if: steps.publish_ready.outputs.ready == 'true'
        uses: actions/cache/restore@v6
        with:
          path: .platformio
          key: ${{ steps.platformio_cache_key.outputs.key }}
          restore-keys: |
            ${{ steps.platformio_cache_key.outputs.restore-key }}

      - name: Compile release device
        if: steps.publish_ready.outputs.ready == 'true'
        run: uv run --locked python scripts/compile_devices.py "${{ steps.meta.outputs.device }}" --firmware-version "${{ steps.meta.outputs.version }}"

      - name: Save PlatformIO cache
        if: steps.publish_ready.outputs.ready == 'true' && steps.platformio_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .platformio
          key: ${{ steps.platformio_cache_key.outputs.key }}

      - name: Package release device
        if: steps.publish_ready.outputs.ready == 'true'
        run: |
          uv run --locked python scripts/package_device.py "${{ steps.meta.outputs.device }}" \
            --version "${{ steps.meta.outputs.version }}" \
            --channel stable \
            --source-sha "${{ steps.meta.outputs.sha }}" \
            --build-profile site-private \
            --require-flashable-secrets

      - name: Publish release device
        if: steps.publish_ready.outputs.ready == 'true'
        run: uv run --locked python scripts/publish_packages.py "${{ steps.meta.outputs.device }}"

  dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:2026.5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - id: platformio_cache_key
        name: Compute PlatformIO cache key
        run: |
          set -eu
          digest="$(git ls-files -z -- 'devices/*.yaml' fleet.yaml pyproject.toml uv.lock | xargs -0 sha256sum | sha256sum | awk '{print $1}')"
          echo "key=platformio-${RUNNER_OS}-esphome-2026.5-$digest" >> "$GITHUB_OUTPUT"
          echo "restore-key=platformio-${RUNNER_OS}-esphome-2026.5-" >> "$GITHUB_OUTPUT"

      - name: Restore PlatformIO cache
        id: platformio_cache
        uses: actions/cache/restore@v6
        with:
          path: .platformio
          key: ${{ steps.platformio_cache_key.outputs.key }}
          restore-keys: |
            ${{ steps.platformio_cache_key.outputs.restore-key }}

      - name: Compile requested devices
        run: |
          rm -f devices/secrets.yaml
          if [ -n "${{ inputs.device }}" ]; then
            uv run --locked python scripts/compile_devices.py "${{ inputs.device }}"
          else
            uv run --locked python scripts/compile_devices.py --all
          fi

      - name: Save PlatformIO cache
        if: steps.platformio_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .platformio
          key: ${{ steps.platformio_cache_key.outputs.key }}
