name: firmware

env:
  FIRMWARE_CACHE_ROOT: /runner-cache/grow-fleet
  PLATFORMIO_CORE_DIR: /runner-cache/grow-fleet/platformio

on:
  pull_request:
    paths:
      - "assets/**"
      - "devices/**"
      - "fleet.yaml"
      - "scripts/**"
      - ".forgejo/workflows/firmware.yml"
  push: {}
  workflow_dispatch:
    inputs:
      device:
        description: "Optional device to compile"
        required: false
        type: string

jobs:
  pr_prepare:
    if: github.event_name == 'pull_request'
    runs-on: stackdrift
    container:
      image: ghcr.io/esphome/esphome:2026.5
      volumes:
        - /srv/forgejo-runner/cache/grow-fleet:/runner-cache/grow-fleet
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_devices: ${{ steps.matrix.outputs.has_devices }}
    steps:
      - name: Verify runner cache mount
        run: |
          set -eu
          if [ ! -d "$FIRMWARE_CACHE_ROOT" ]; then
            echo "Firmware cache root is missing: $FIRMWARE_CACHE_ROOT" >&2
            echo "Configure runner volume /srv/forgejo-runner/cache/grow-fleet:$FIRMWARE_CACHE_ROOT." >&2
            exit 1
          fi
          if [ ! -w "$FIRMWARE_CACHE_ROOT" ]; then
            echo "Firmware cache root is not writable: $FIRMWARE_CACHE_ROOT" >&2
            exit 1
          fi
          mkdir -p "$PLATFORMIO_CORE_DIR"
      - name: Checkout repository
        run: |
          set -eu
          server="${FORGEJO_SERVER_URL:-${GITHUB_SERVER_URL:-https://codeberg.org}}"
          repo="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY:-stackdrift/grow-fleet}}"
          sha="${FORGEJO_SHA:-${GITHUB_SHA:?missing checkout sha}}"
          repo_url="${server}/${repo}.git"
          git init .
          git remote remove origin 2>/dev/null || true
          git remote add origin "$repo_url"
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*'
          git checkout --detach "$sha"
      - id: matrix
        run: |
          MATRIX="$(python3 scripts/impacted_devices.py --base '${{ github.event.pull_request.base.sha }}' --head '${{ github.event.pull_request.head.sha }}' --matrix)"
          HAS_DEVICES="$(MATRIX="$MATRIX" python3 -c 'import json, os; payload = json.loads(os.environ["MATRIX"]); print("true" if payload.get("include") else "false")')"
          output_path="${FORGEJO_OUTPUT:-$GITHUB_OUTPUT}"
          echo "matrix=$MATRIX" >> "$output_path"
          echo "has_devices=$HAS_DEVICES" >> "$output_path"

  pr_compile:
    if: github.event_name == 'pull_request' && needs.pr_prepare.outputs.has_devices == 'true'
    needs: pr_prepare
    runs-on: stackdrift
    container:
      image: ghcr.io/esphome/esphome:2026.5
      volumes:
        - /srv/forgejo-runner/cache/grow-fleet:/runner-cache/grow-fleet
    strategy:
      matrix: ${{ fromJson(needs.pr_prepare.outputs.matrix) }}
    steps:
      - name: Verify runner cache mount
        run: |
          set -eu
          if [ ! -d "$FIRMWARE_CACHE_ROOT" ]; then
            echo "Firmware cache root is missing: $FIRMWARE_CACHE_ROOT" >&2
            echo "Configure runner volume /srv/forgejo-runner/cache/grow-fleet:$FIRMWARE_CACHE_ROOT." >&2
            exit 1
          fi
          if [ ! -w "$FIRMWARE_CACHE_ROOT" ]; then
            echo "Firmware cache root is not writable: $FIRMWARE_CACHE_ROOT" >&2
            exit 1
          fi
          mkdir -p "$PLATFORMIO_CORE_DIR"
      - name: Checkout repository
        run: |
          set -eu
          server="${FORGEJO_SERVER_URL:-${GITHUB_SERVER_URL:-https://codeberg.org}}"
          repo="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY:-stackdrift/grow-fleet}}"
          sha="${FORGEJO_SHA:-${GITHUB_SHA:?missing checkout sha}}"
          repo_url="${server}/${repo}.git"
          git init .
          git remote remove origin 2>/dev/null || true
          git remote add origin "$repo_url"
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*'
          git checkout --detach "$sha"
      - name: Compile impacted device
        run: python3 scripts/compile_devices.py "${{ matrix.device }}"

  main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: stackdrift
    container:
      image: ghcr.io/esphome/esphome:2026.5
      volumes:
        - /srv/forgejo-runner/cache/grow-fleet:/runner-cache/grow-fleet
    steps:
      - name: Verify runner cache mount
        run: |
          set -eu
          if [ ! -d "$FIRMWARE_CACHE_ROOT" ]; then
            echo "Firmware cache root is missing: $FIRMWARE_CACHE_ROOT" >&2
            echo "Configure runner volume /srv/forgejo-runner/cache/grow-fleet:$FIRMWARE_CACHE_ROOT." >&2
            exit 1
          fi
          if [ ! -w "$FIRMWARE_CACHE_ROOT" ]; then
            echo "Firmware cache root is not writable: $FIRMWARE_CACHE_ROOT" >&2
            exit 1
          fi
          mkdir -p "$PLATFORMIO_CORE_DIR"
      - name: Checkout repository
        run: |
          set -eu
          server="${FORGEJO_SERVER_URL:-${GITHUB_SERVER_URL:-https://codeberg.org}}"
          repo="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY:-stackdrift/grow-fleet}}"
          sha="${FORGEJO_SHA:-${GITHUB_SHA:?missing checkout sha}}"
          repo_url="${server}/${repo}.git"
          git init .
          git remote remove origin 2>/dev/null || true
          git remote add origin "$repo_url"
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*'
          git checkout --detach "$sha"
      - id: edge_meta
        name: Build edge firmware metadata
        run: |
          sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          version="edge-$(date -u +%Y%m%dT%H%M%SZ)-$short_sha"
          output_path="${FORGEJO_OUTPUT:-$GITHUB_OUTPUT}"
          echo "sha=$sha" >> "$output_path"
          echo "version=$version" >> "$output_path"
      - name: Compile release devices for edge
        run: python3 scripts/compile_devices.py --all --release-only --firmware-version "${{ steps.edge_meta.outputs.version }}"
      - name: Store firmware cache
        run: |
          python3 scripts/cache_firmware.py store --sha "${{ steps.edge_meta.outputs.sha }}" --all --release-only
      - name: Package edge devices
        run: |
          devices="$(python3 scripts/list_devices.py --release-only)"
          for device in $devices; do
            python3 scripts/package_device.py "$device" \
              --version "${{ steps.edge_meta.outputs.version }}" \
              --channel edge \
              --source-sha "${{ steps.edge_meta.outputs.sha }}"
          done
      - name: Publish edge devices
        env:
          PACKAGE_AUTH_USER: ${{ secrets.PACKAGE_AUTH_USER }}
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: |
          devices="$(python3 scripts/list_devices.py --release-only)"
          python3 scripts/publish_packages.py --prune-edge --keep-edge 10 $devices
      - name: Prune firmware cache
        run: python3 scripts/cache_firmware.py prune --max-age-days 30 --keep-shas 10

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/firmware/')
    runs-on: stackdrift
    container:
      image: ghcr.io/esphome/esphome:2026.5
      volumes:
        - /srv/forgejo-runner/cache/grow-fleet:/runner-cache/grow-fleet
    steps:
      - name: Verify runner cache mount
        run: |
          set -eu
          if [ ! -d "$FIRMWARE_CACHE_ROOT" ]; then
            echo "Firmware cache root is missing: $FIRMWARE_CACHE_ROOT" >&2
            echo "Configure runner volume /srv/forgejo-runner/cache/grow-fleet:$FIRMWARE_CACHE_ROOT." >&2
            exit 1
          fi
          if [ ! -w "$FIRMWARE_CACHE_ROOT" ]; then
            echo "Firmware cache root is not writable: $FIRMWARE_CACHE_ROOT" >&2
            exit 1
          fi
          mkdir -p "$PLATFORMIO_CORE_DIR"
      - name: Checkout repository
        run: |
          set -eu
          server="${FORGEJO_SERVER_URL:-${GITHUB_SERVER_URL:-https://codeberg.org}}"
          repo="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY:-stackdrift/grow-fleet}}"
          sha="${FORGEJO_SHA:-${GITHUB_SHA:?missing checkout sha}}"
          repo_url="${server}/${repo}.git"
          git init .
          git remote remove origin 2>/dev/null || true
          git remote add origin "$repo_url"
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*'
          git checkout --detach "$sha"
      - id: meta
        run: |
          tag="${FORGEJO_REF_NAME:-$GITHUB_REF_NAME}"
          rest="${tag#firmware/}"
          device="${rest%%/v*}"
          version="${tag#firmware/$device/}"
          sha="$(git rev-parse HEAD)"
          output_path="${FORGEJO_OUTPUT:-$GITHUB_OUTPUT}"
          echo "device=$device" >> "$output_path"
          echo "version=$version" >> "$output_path"
          echo "sha=$sha" >> "$output_path"
      - id: firmware_cache
        name: Restore cached release firmware
        run: |
          set +e
          python3 scripts/cache_firmware.py restore \
            --sha "${{ steps.meta.outputs.sha }}" \
            --wait-seconds 60 \
            "${{ steps.meta.outputs.device }}"
          status="$?"
          set -e
          output_path="${FORGEJO_OUTPUT:-$GITHUB_OUTPUT}"
          if [ "$status" -eq 0 ]; then
            echo "hit=true" >> "$output_path"
          elif [ "$status" -eq 1 ]; then
            echo "hit=false" >> "$output_path"
          else
            exit "$status"
          fi
      - name: Compile release device
        if: steps.firmware_cache.outputs.hit != 'true'
        run: python3 scripts/compile_devices.py "${{ steps.meta.outputs.device }}" --firmware-version "${{ steps.meta.outputs.version }}"
      - name: Store release firmware cache
        if: steps.firmware_cache.outputs.hit != 'true'
        run: python3 scripts/cache_firmware.py store --sha "${{ steps.meta.outputs.sha }}" "${{ steps.meta.outputs.device }}"
      - name: Package release device
        run: |
          python3 scripts/package_device.py "${{ steps.meta.outputs.device }}" \
            --version "${{ steps.meta.outputs.version }}" \
            --channel stable \
            --source-sha "${{ steps.meta.outputs.sha }}"
      - name: Publish release device
        env:
          PACKAGE_AUTH_USER: ${{ secrets.PACKAGE_AUTH_USER }}
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: python3 scripts/publish_packages.py "${{ steps.meta.outputs.device }}"

  dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: stackdrift
    container:
      image: ghcr.io/esphome/esphome:2026.5
      volumes:
        - /srv/forgejo-runner/cache/grow-fleet:/runner-cache/grow-fleet
    steps:
      - name: Verify runner cache mount
        run: |
          set -eu
          if [ ! -d "$FIRMWARE_CACHE_ROOT" ]; then
            echo "Firmware cache root is missing: $FIRMWARE_CACHE_ROOT" >&2
            echo "Configure runner volume /srv/forgejo-runner/cache/grow-fleet:$FIRMWARE_CACHE_ROOT." >&2
            exit 1
          fi
          if [ ! -w "$FIRMWARE_CACHE_ROOT" ]; then
            echo "Firmware cache root is not writable: $FIRMWARE_CACHE_ROOT" >&2
            exit 1
          fi
          mkdir -p "$PLATFORMIO_CORE_DIR"
      - name: Checkout repository
        run: |
          set -eu
          server="${FORGEJO_SERVER_URL:-${GITHUB_SERVER_URL:-https://codeberg.org}}"
          repo="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY:-stackdrift/grow-fleet}}"
          sha="${FORGEJO_SHA:-${GITHUB_SHA:?missing checkout sha}}"
          repo_url="${server}/${repo}.git"
          git init .
          git remote remove origin 2>/dev/null || true
          git remote add origin "$repo_url"
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*'
          git checkout --detach "$sha"
      - name: Compile requested devices
        run: |
          if [ -n "${{ inputs.device }}" ]; then
            python3 scripts/compile_devices.py "${{ inputs.device }}"
          else
            python3 scripts/compile_devices.py --all
          fi
