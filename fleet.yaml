component_dependency: &stackdrift_esphome_components
  source:
    type: git
    url: https://github.com/dephekt/esphome-components.git
    ref: 798fa7268b5940f1dcfef3ff05e601e5b004fe81
    path: .

devices:
  atlas-hydro-kit:
    config: devices/atlas-hydro-kit.yaml
    esphome_name: atlas-hydro-monitor
    node_id: atlas-hydro-monitor
    project_name: stackdrift.atlas-hydro-kit
    package: atlas-hydro-kit
    package_owner: stackdrift-firmware
    chip_family: ESP32
    release: true
    component_dependency: *stackdrift_esphome_components
  atoms3u-sensor-rig:
    config: devices/atoms3u-sensor-rig.yaml
    esphome_name: atoms3u-sensor-rig
    node_id: atoms3u-sensor-rig
    project_name: stackdrift.atoms3u-sensor-rig
    package: atoms3u-sensor-rig
    package_owner: stackdrift-firmware
    chip_family: ESP32-S3
    release: true
    assets:
      - assets/thermal_overlay.js
    # Pinned ahead of the shared anchor: this rig needs the hardened qmp6988
    # component, which is not yet in the fleet-wide pin. Re-join the anchor once
    # the shared pin advances past it.
    component_dependency:
      source:
        type: git
        url: https://github.com/dephekt/esphome-components.git
        ref: e17a2f20b621987fdde2397f8ac269b895e72cdf
        path: .
  m5stack-airq:
    config: devices/m5stack-airq.yaml
    esphome_name: m5stack-airq
    node_id: m5stack-airq
    project_name: stackdrift.m5stack-airq
    package: m5stack-airq
    package_owner: stackdrift-firmware
    chip_family: ESP32-S3
    release: false
    component_dependency: *stackdrift_esphome_components
